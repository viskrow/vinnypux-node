services:
  nginx:
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
    container_name: wombat
    # Host network: nginx биндится на :80/:443 хоста напрямую без docker-proxy/NAT.
    # proxy_pass идёт на 127.0.0.1:4443 (loopback) → xray (тоже host network).
    # Loopback connections не тратят ephemeral порты public-pool'а так как ядро
    # это short-circuit'ит. Selfsteal listen-block в nginx.conf обязан биндиться
    # ТОЛЬКО на 127.0.0.1:9443, иначе :9443 окажется публичным.
    network_mode: host
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    restart: unless-stopped
