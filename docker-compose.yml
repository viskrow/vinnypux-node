services:
  nginx:
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
    container_name: wombat
    ports:
      - "80:80"                  # optional reserve (HTTP origin для CDN-схем)
      - "127.0.0.1:9443:9443"    # self-steal target для xray Reality (proxy_protocol)
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    restart: unless-stopped
