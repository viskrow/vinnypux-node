worker_processes     auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept       on;
    use                epoll;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Производительность ───────────────────────────────────────────────────
    sendfile                  on;
    tcp_nopush                on;
    tcp_nodelay               on;
    server_tokens             off;
    keepalive_timeout         75s;
    keepalive_requests        1000;
    reset_timedout_connection on;

    # ── TLS (глобально) ──────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # Wildcard *.vinnypuxtomoon.today — выпускается через acme.sh (DNS-challenge).
    # wl-ws серты (self-signed для IP) лежат в ssl/wl-ws/ — используются отдельно.
    ssl_certificate     /etc/nginx/ssl/vinnypuxtomoon/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/vinnypuxtomoon/key.pem;

    # Docker DNS — нужен для ленивого резолва host.docker.internal
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Общие location-блоки (вынесены через include-подобный include) ───────
    # Статика React SPA — одинакова для всех server-блоков
    map $uri $spa_expires {
        ~*\.(js|css|png|jpg|jpeg|svg|ico|woff2|woff)$ "1y";
        default                                          "-1";
    }

    # ─────────────────────────────────────────────────────────────────────────
    # 1. ГЛАВНЫЙ ДОМЕН: vinnypuxtomoon.today — только лендинг
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl default_server reuseport;
        http2  on;
        server_name vinnypuxtomoon.today;

        location / {
            root      /usr/share/nginx/html;
            index     index.html;
            try_files $uri $uri/ /index.html;
            expires   -1;
        }

        location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2|woff)$ {
            root    /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # 2. TCP-НОДА: ca-t.vinnypuxtomoon.today
    #    Браузер → лендинг
    #    VPN-клиент → VLESS + WS → xray:2083
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name ca-t.vinnypuxtomoon.today;

        # WebSocket → xray inbound "ca-t" (port 2083, network: ws, security: none)
        location ^~ /ws {
            set $upstream_ws http://host.docker.internal:2083;
            proxy_pass         $upstream_ws;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade         $http_upgrade;
            proxy_set_header   Connection      "upgrade";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering    off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location / {
            root      /usr/share/nginx/html;
            index     index.html;
            try_files $uri $uri/ /index.html;
            expires   -1;
        }

        location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2|woff)$ {
            root    /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # 3. gRPC-НОДА: ca-g.vinnypuxtomoon.today
    #    Браузер → лендинг
    #    VPN-клиент → VLESS + gRPC → xray:2084
    #    serviceName: "grpc" → путь /grpc/Tun
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name ca-g.vinnypuxtomoon.today;

        # gRPC → xray inbound "ca-g" (port 2084, network: grpc, security: none)
        location /grpc {
            set $upstream_grpc grpc://host.docker.internal:2084;
            grpc_pass          $upstream_grpc;
            grpc_read_timeout  3600s;
            grpc_send_timeout  3600s;
            grpc_set_header    X-Real-IP $remote_addr;
        }

        location / {
            root      /usr/share/nginx/html;
            index     index.html;
            try_files $uri $uri/ /index.html;
            expires   -1;
        }

        location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2|woff)$ {
            root    /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # 4. WL-НОДЫ: uno.kittystars.ru — XHTTP
    #    CDN → origin :80 → nginx → xray:2085
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        # На wl-ноде: раскомментировать после генерации серта в nginx/ssl/wl-ws/
        # listen 443 ssl;
        # ssl_certificate     /etc/nginx/ssl/wl-ws/cert.pem;
        # ssl_certificate_key /etc/nginx/ssl/wl-ws/key.pem;
        server_name uno.kittystars.ru;

        location ^~ /xhttp {
            proxy_pass              http://172.17.0.1:2085;
            proxy_http_version      1.1;
            proxy_set_header        Host            $host;
            proxy_set_header        X-Real-IP       $remote_addr;
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_request_buffering off;
            proxy_buffering         off;
            proxy_read_timeout      3600s;
            proxy_send_timeout      3600s;
        }

        location / {
            root      /usr/share/nginx/html;
            index     index.html;
            try_files $uri $uri/ /index.html;
            expires   -1;
        }

        location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2|woff)$ {
            root    /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # 5. WL-НОДЫ: wl1/wl2.kittystars.ru — WebSocket
    #    CDN (uno.kittystars.ru) → origin :80/:443 → nginx → xray
    #    /ws    → xray:2083  (VLESS + WS,    security: none)
    #    /xhttp → xray:2085  (VLESS + XHTTP, security: none)
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        # На wl-ноде: раскомментировать после генерации серта в nginx/ssl/wl-ws/
        # listen 443 ssl;
        # ssl_certificate     /etc/nginx/ssl/wl-ws/cert.pem;
        # ssl_certificate_key /etc/nginx/ssl/wl-ws/key.pem;
        server_name wl1.kittystars.ru;

        # WS → xray wl1-kittystars-ws (port 2083)
        location ^~ /ws {
            proxy_pass         http://172.17.0.1:2083;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade         $http_upgrade;
            proxy_set_header   Connection      "upgrade";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering    off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # XHTTP → xray wl1-kittystars-xhttp (port 2085)
        location ^~ /xhttp {
            proxy_pass              http://172.17.0.1:2085;
            proxy_http_version      1.1;
            proxy_set_header        Host            $host;
            proxy_set_header        X-Real-IP       $remote_addr;
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_request_buffering off;
            proxy_buffering         off;
            proxy_read_timeout      3600s;
            proxy_send_timeout      3600s;
        }

        location / {
            root      /usr/share/nginx/html;
            index     index.html;
            try_files $uri $uri/ /index.html;
            expires   -1;
        }

        location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2|woff)$ {
            root    /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    server {
        listen 80;
        # На wl-ноде: раскомментировать после генерации серта в nginx/ssl/wl-ws/
        # listen 443 ssl;
        # ssl_certificate     /etc/nginx/ssl/wl-ws/cert.pem;
        # ssl_certificate_key /etc/nginx/ssl/wl-ws/key.pem;
        server_name wl2.kittystars.ru;

        # WS → xray wl2-kittystars-ws (port 2083)
        location ^~ /ws {
            proxy_pass         http://172.17.0.1:2083;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade         $http_upgrade;
            proxy_set_header   Connection      "upgrade";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering    off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # XHTTP → xray wl2-kittystars-xhttp (port 2085)
        location ^~ /xhttp {
            proxy_pass              http://172.17.0.1:2085;
            proxy_http_version      1.1;
            proxy_set_header        Host            $host;
            proxy_set_header        X-Real-IP       $remote_addr;
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_request_buffering off;
            proxy_buffering         off;
            proxy_read_timeout      3600s;
            proxy_send_timeout      3600s;
        }

        location / {
            root      /usr/share/nginx/html;
            index     index.html;
            try_files $uri $uri/ /index.html;
            expires   -1;
        }

        location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2|woff)$ {
            root    /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # 6. WL-НОДА: cdn-2.caxero.ru — WebSocket
    #    CDN (cdn-2.caxero.ru) → origin 194.76.137.178 :80/:443 → nginx → xray:2083
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        # На wl-ноде: раскомментировать после генерации серта в nginx/ssl/wl-ws/
        # listen 443 ssl;
        # ssl_certificate     /etc/nginx/ssl/wl-ws/cert.pem;
        # ssl_certificate_key /etc/nginx/ssl/wl-ws/key.pem;
        server_name cdn-2.caxero.ru;

        # WS → xray cdn2-caxero-ws (port 2083)
        location ^~ /ws {
            proxy_pass         http://172.17.0.1:2083;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade         $http_upgrade;
            proxy_set_header   Connection      "upgrade";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering    off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location / {
            root      /usr/share/nginx/html;
            index     index.html;
            try_files $uri $uri/ /index.html;
            expires   -1;
        }

        location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2|woff)$ {
            root    /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # 7. CATCH-ALL: неизвестные поддомены → лендинг (без VPN)
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name _;

        location / {
            root      /usr/share/nginx/html;
            index     index.html;
            try_files $uri $uri/ /index.html;
            expires   -1;
        }

        location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2|woff)$ {
            root    /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
