worker_processes     auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 32768;
    multi_accept       on;
    use                epoll;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Performance
    sendfile                  on;
    tcp_nopush                on;
    tcp_nodelay               on;
    server_tokens             off;
    keepalive_timeout         75s;
    keepalive_requests        1000;
    reset_timedout_connection on;

    # WebSocket upgrade helper: "upgrade" for WS handshakes, "" for plain HTTP (xhttp/landing).
    map $http_upgrade $conn_up { default upgrade; '' ''; }

    # xray xHTTP inbound (CDN origin-pull). Keepalive pool: without it nginx opens a new
    # TCP to xray per request → ephemeral-port exhaustion under 10k+ tunnels. Pool reuses
    # idle conns. wombat is host-network → xray on 127.0.0.1:4443.
    upstream xray_cdn {
        server 127.0.0.1:4443;
        keepalive          1024;
        keepalive_requests 10000;
        keepalive_timeout  600s;
    }

    # xray WS inbound (generic CDN + WebSocket origin-pull).
    upstream xray_ws {
        server 127.0.0.1:8444;
        keepalive          1024;
        keepalive_requests 10000;
        keepalive_timeout  600s;
    }

    # TLS (global). Wildcard *.vinnypuxtomoon.today via acme.sh DNS-01.
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_certificate     /etc/nginx/ssl/vinnypuxtomoon/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/vinnypuxtomoon/key.pem;

    # ─────────────────────────────────────────────────────────────────────────
    # Self-steal target for xray REALITY fallback (PROXY protocol, xver=1).
    #   Loopback-only :9443 (wombat is host-network → must not be public).
    #   Trusts the PROXY header from xray to log the real client IP.
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 127.0.0.1:9443 ssl proxy_protocol default_server;
        http2  on;
        server_name _;

        set_real_ip_from 127.0.0.1;
        real_ip_header   proxy_protocol;

        location / {
            root      /usr/share/nginx/html;
            index     index.html;
            try_files $uri $uri/ /index.html;
            expires   -1;
        }
        location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2|woff)$ {
            root    /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # CDN origin-pull — ANY CDN (Beeline/VK/Yandex/MTS/NGENIX/…), on :80 and :443.
    #   Domain/SNI-agnostic (server_name _). Routing is PATH-based, so a new CDN
    #   needs no nginx edit — it just forwards a canonical path (we set it in the
    #   client URL). TLS terminates at the CDN edge; origin-pull to us is plain
    #   HTTP:80 or HTTPS:443. Non-tunnel requests (browser/probe) fall to the
    #   self-steal landing, keeping the cover intact.
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80  default_server;
        listen 443 ssl default_server;
        http2 on;
        server_name _;

        # xHTTP tunnel (any CDN) → xray_cdn pool. Canonical path.
        # session/seq live in the query (defeats edge caching, e.g. Beeline). The
        # rewrite restores the trailing slash a caching CDN strips on its edge nodes.
        location ^~ /static/getFile/video/segment.ts {
            rewrite ^/static/getFile/video/segment\.ts$ /static/getFile/video/segment.ts/ break;
            proxy_pass         http://xray_cdn;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering         off;
            proxy_request_buffering off;
            proxy_read_timeout      3600s;
            proxy_send_timeout      3600s;
            add_header X-Accel-Buffering "no"       always;
            add_header CDN-Cache-Control "no-store" always;
        }

        # xHTTP tunnel (any CDN, legacy path) → xray_cdn pool.
        location /api/cdn/assets {
            proxy_pass         http://xray_cdn;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering         off;
            proxy_request_buffering off;
            proxy_read_timeout      3600s;
            proxy_send_timeout      3600s;
        }

        # WebSocket tunnel (any CDN) → xray_ws. Canonical ws path.
        location ^~ /api/v1/assistant/stream {
            proxy_pass         http://xray_ws;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $conn_up;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_buffering         off;
            proxy_request_buffering off;
            proxy_read_timeout      3600s;
            proxy_send_timeout      3600s;
        }

        # Everything else → self-steal landing (also answers CDN health probes with 200).
        location / {
            root      /usr/share/nginx/html;
            index     index.html;
            try_files $uri $uri/ /index.html;
        }
    }

    # Pearly-only dev drop-ins (NGENIX vinnyplace verify etc.). Prod nodes glob to
    # zero files (conf.d/local is created empty by the Dockerfile) → no crash/leak.
    include /etc/nginx/conf.d/local/*.conf;
}
