worker_processes     auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept       on;
    use                epoll;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Производительность ───────────────────────────────────────────────────
    sendfile                  on;
    tcp_nopush                on;
    tcp_nodelay               on;
    server_tokens             off;
    keepalive_timeout         75s;
    keepalive_requests        1000;
    reset_timedout_connection on;

    # ── TLS (глобально) ──────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # Wildcard *.vinnypuxtomoon.today — выпускается через acme.sh (DNS-01).
    ssl_certificate     /etc/nginx/ssl/vinnypuxtomoon/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/vinnypuxtomoon/key.pem;

    # Статика React SPA — кешируем ассеты на 1 год
    map $uri $spa_expires {
        ~*\.(js|css|png|jpg|jpeg|svg|ico|woff2|woff)$ "1y";
        default                                          "-1";
    }

    # ─────────────────────────────────────────────────────────────────────────
    # SELF-STEAL TARGET (для xray Reality, с PROXY protocol от xver=1)
    #   Слушает 9443 ВНУТРИ контейнера, проброшен с хоста через
    #   127.0.0.1:9443:9443 в docker-compose.yml. Доступен ТОЛЬКО для xray.
    #   Принимает PROXY protocol → подставляет реальный IP клиента в логи.
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 9443 ssl proxy_protocol default_server;
        http2  on;
        server_name _;

        # Доверяем PROXY header от xray на хосте (через docker bridge gateway)
        set_real_ip_from 127.0.0.1;
        set_real_ip_from 172.17.0.0/16;
        real_ip_header   proxy_protocol;

        location / {
            root      /usr/share/nginx/html;
            index     index.html;
            try_files $uri $uri/ /index.html;
            expires   -1;
        }

        location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2|woff)$ {
            root    /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # CDN ORIGIN PULL (CDNvideo / trbcdn)
    #   Принимает HTTP origin pull от CDN-edge на :80 (TLS терминируется
    #   на CDN-стороне, до origin plain HTTP).
    #     fdc.caxero.ru  → 50.7.85.114    via pib0rsmna0.a.trbcdn.net
    #     the.caxero.ru  → 31.222.238.80  via mft1sn6x62.a.trbcdn.net
    #   Один server-блок на оба домена — на каждой ноде матчится только
    #   её собственный server_name (DNS A-record указывает в этот сервер).
    #   Forward → xray VLESS+XHTTP+xPadding на host:4443 (xray слушает 0.0.0.0
    #   на host network; UFW снаружи :4443 блокирует — доступен только локально).
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name fdc.caxero.ru the.caxero.ru;

        location / {
            proxy_pass         http://host.docker.internal:4443;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Critical для XHTTP — без буферизации, чтобы long-poll стримился
            proxy_buffering         off;
            proxy_request_buffering off;
            proxy_read_timeout      3600s;
            proxy_send_timeout      3600s;
        }
    }
}
