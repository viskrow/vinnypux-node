worker_processes     auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 32768;
    multi_accept       on;
    use                epoll;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Производительность ───────────────────────────────────────────────────
    sendfile                  on;
    tcp_nopush                on;
    tcp_nodelay               on;
    server_tokens             off;
    keepalive_timeout         75s;
    keepalive_requests        1000;
    reset_timedout_connection on;

    # ── Upstream pool для CDN→xray (xhttp) ───────────────────────────────────
    # КРИТИЧНО: без keepalive nginx открывает новый TCP к xray на каждый запрос
    # → исчерпание ephemeral портов (EADDRNOTAVAIL/errno 99). С 10k+ активных
    # xhttp-туннелей × xmux 16-32 стримов = ~200k запросов/мин → port-exhaustion
    # за минуты. С keepalive держим pool из 1024 idle conn, переиспользуем.
    # Wombat запускается в network_mode: host → xray на 127.0.0.1:4443 (loopback,
    # без NAT через docker-bridge, не считается в ephemeral port pool так строго).
    upstream xray_cdn {
        server 127.0.0.1:4443;
        keepalive          1024;
        keepalive_requests 10000;
        keepalive_timeout  600s;
    }

    # Upstream для MWS CDN → xray VLESS+WS (mws-ws-test1, на node-94).
    # На других нодах :5443 не слушает — origin pull не идёт, апстрим idle.
    upstream xray_ws {
        server 127.0.0.1:5443;
        keepalive          1024;
        keepalive_requests 10000;
        keepalive_timeout  600s;
    }

    # Upstream для NGENIX CDN → xray VLESS+WS (cdn-ws-test6, на th-nl :8444).
    upstream xray_cdnws {
        server 127.0.0.1:8444;
        keepalive          1024;
        keepalive_requests 10000;
        keepalive_timeout  600s;
    }

    # ── TLS (глобально) ──────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # Wildcard *.vinnypuxtomoon.today — выпускается через acme.sh (DNS-01).
    ssl_certificate     /etc/nginx/ssl/vinnypuxtomoon/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/vinnypuxtomoon/key.pem;

    # Статика React SPA — кешируем ассеты на 1 год
    map $uri $spa_expires {
        ~*\.(js|css|png|jpg|jpeg|svg|ico|woff2|woff)$ "1y";
        default                                          "-1";
    }

    # ─────────────────────────────────────────────────────────────────────────
    # SELF-STEAL TARGET (для xray Reality, с PROXY protocol от xver=1)
    #   Слушает 9443 ВНУТРИ контейнера, проброшен с хоста через
    #   127.0.0.1:9443:9443 в docker-compose.yml. Доступен ТОЛЬКО для xray.
    #   Принимает PROXY protocol → подставляет реальный IP клиента в логи.
    # ─────────────────────────────────────────────────────────────────────────
    server {
        # bind ТОЛЬКО на loopback — wombat в host network mode, иначе :9443
        # окажется публично доступным → нельзя.
        listen 127.0.0.1:9443 ssl proxy_protocol default_server;
        http2  on;
        server_name _;

        # Доверяем PROXY header от xray (теперь тоже на host network, источник 127.0.0.1)
        set_real_ip_from 127.0.0.1;
        real_ip_header   proxy_protocol;

        location / {
            root      /usr/share/nginx/html;
            index     index.html;
            try_files $uri $uri/ /index.html;
            expires   -1;
        }

        location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2|woff)$ {
            root    /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # MWS CDN ORIGIN PULL → xray VLESS+WS (mts.caxero.ru → node-94)
    #   CDN top3359944587.mwscdn.ru (CNAME mts.caxero.ru) терминирует TLS на
    #   edge'е, к origin лезет HTTP:80. Mатчит этот server_name → /ws апгрейдит
    #   до WebSocket → upstream 127.0.0.1:5443 (xray VLESS+WS, security=none).
    #   Корневой / отвечает 200 «OK» — CDN HEAD-пробы не падают 400.
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name mts.caxero.ru;

        location /ws {
            proxy_pass         http://xray_ws;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_buffering         off;
            proxy_request_buffering off;
            proxy_read_timeout      3600s;
            proxy_send_timeout      3600s;
        }

        location / {
            return 200 "ok\n";
            add_header Content-Type "text/plain";
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # NGENIX CDN ORIGIN PULL → xray VLESS+WS (cdn.vinnyplace.ru → th-nl)
    #   NGENIX edge терминирует client TLS своим cert'ом, к origin лезет HTTP:80.
    #   /api/v1/assistant/stream апгрейдит до WebSocket → upstream 127.0.0.1:8444
    #   (xray cdn-ws-test6, security=none). Корневой / отвечает 200 для health-проб.
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name cdn.vinnyplace.ru;

        location /api/v1/assistant/stream {
            proxy_pass         http://xray_cdnws;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_buffering         off;
            proxy_request_buffering off;
            proxy_read_timeout      3600s;
            proxy_send_timeout      3600s;
        }

        location / {
            return 200 "ok\n";
            add_header Content-Type "text/plain";
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # CDN ORIGIN PULL (CDNvideo / trbcdn)
    #   Принимает HTTP origin pull от CDN-edge на :80 (TLS терминируется
    #   на CDN-стороне, до origin plain HTTP).
    #     fdc.caxero.ru  → 50.7.85.114    via pib0rsmna0.a.trbcdn.net
    #     the.caxero.ru  → 31.222.238.80  via mft1sn6x62.a.trbcdn.net
    #   Один server-блок на оба домена — на каждой ноде матчится только
    #   её собственный server_name (DNS A-record указывает в этот сервер).
    #   Forward → upstream xray_cdn (127.0.0.1:4443, keepalive pool).
    #   :80 для ACME / fallback. CDNvideo по факту тянет origin по HTTPS:443.
    #   Cert: wildcard vinnypuxtomoon (CN не совпадёт с fdc/the.caxero.ru — CDN
    #   origin-pull обычно не верифицирует cert).
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        listen 443 ssl;
        http2 on;
        server_name fdc.caxero.ru the.caxero.ru pib0rsmna0.a.trbcdn.net;

        location / {
            proxy_pass         http://xray_cdn;
            proxy_http_version 1.1;
            # Connection "" — обязательно для keepalive в upstream pool, иначе
            # nginx добавляет "Connection: close" и переиспользования нет.
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Critical для XHTTP — без буферизации, чтобы long-poll стримился
            proxy_buffering         off;
            proxy_request_buffering off;
            proxy_read_timeout      3600s;
            proxy_send_timeout      3600s;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Pearly-only (dev) drop-ins: NGENIX vinnyplace.ru verification landing и т.п.
    #   Эти server-блоки требуют per-domain cert'ы, которых нет на прод-нодах →
    #   крашат wombat. Поэтому вынесены в gitignored conf.d/local/, монтируются
    #   ТОЛЬКО на pearly через docker-compose.override.yml. Dockerfile COPY'ит
    #   лишь nginx.conf, а conf.d/local создаётся пустым (mkdir) → на проде glob
    #   матчит ноль файлов → чисто, без краша и без leak'а vinnyplace.ru.
    # ─────────────────────────────────────────────────────────────────────────
    include /etc/nginx/conf.d/local/*.conf;
}
